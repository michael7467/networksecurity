<!DOCTYPE html>
<html>
    <head>
        <title>Data Table</title>
        <style>
            table {
                border-collapse: collapse;
                width: 100%;
            }
            th, td {
                border: 1px solid #ddd;
                padding: 8px;
                text-align: left;
            }
        </style>
    </head>
    <body>
        <h3>Predicted Data</h3>
        {{ table | safe }}
    </body>
</html>
